name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # Opt-in temprano al runtime de Node.js 24 para acciones JavaScript.
  # Evita warnings por deprecación de Node 20 en GitHub Actions.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        shell: bash
        run: |
          # npm ci requiere lockfile. Si aún no existe, hacemos fallback a npm install
          # para no bloquear el pipeline mientras se versiona package-lock.json.
          if [[ -f package-lock.json ]]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Build Angular app for GitHub Pages
        run: npm run build:pages

      - name: Debug dist
        run: ls -R dist

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          # Crea/habilita Pages cuando todavía no está configurado en el repositorio.
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/ArchConverterPro/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
